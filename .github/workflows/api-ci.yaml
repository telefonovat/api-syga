name: api-continuous-integration
on: [push]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - run: npm audit --omit=dev
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run test
